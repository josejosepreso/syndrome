services:
  multiproxies:
    build: ./multiproxies-service
    container_name: multiproxies-service
    ports:
      - "3000:3000"
    restart: unless-stopped

  client:
    build: ./client-service
    container_name: client-service
    depends_on:
      - multiproxies
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      MULTIPROXIES_SERVICE_URL: ${MULTIPROXIES_SERVICE_URL}
      BACKEND_APPLICATION_SERVICE_URL: ${BACKEND_APPLICATION_SERVICE_URL}
      PDF_GENERATOR_SERVICE_URL: ${PDF_GENERATOR_SERVICE_URL}

  mysql:
    image: mysql:latest
    container_name: db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d

  backend:
    build: ./backend-application
    container_name: backend-application
    depends_on:
      - mysql
    ports:
      - "8081:8081"
    restart: unless-stopped
    environment:
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}

  pdf-report-generator:
    build: ./pdf-generator-service
    container_name: pdf-generator-service
    ports:
      - "8082:8082"
    restart: unless-stopped

volumes:
  mysql_data:
